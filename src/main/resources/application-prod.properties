# ================================================
# BuildPOS — Production Profile
# src/main/resources/application-prod.properties
# ================================================

# DataSource (environment variable dan o'qiydi)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
# 900000 ms = 15 daqiqa (hozir 24 soat edi, xavfsizroq qildik)

# Swagger — production da O'CHIRILADI
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator — faqat health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Upload
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}

# CORS — faqat o'z domenimiz
app.cors.allowed-origins=https://primestroy.uz,https://www.primestroy.uz

# Logging
logging.level.root=WARN
logging.level.com.buildpos=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
