# ================================================
# BuildPOS — Nginx konfiguratsiya
# Domen: primestroy.uz
# ================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name primestroy.uz www.primestroy.uz;

    # Let's Encrypt tekshiruvi uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://primestroy.uz$request_uri;
    }
}

# HTTPS — asosiy server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name primestroy.uz www.primestroy.uz;

    # SSL sertifikat (Certbot o'rnatadi)
    ssl_certificate     /etc/letsencrypt/live/primestroy.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/primestroy.uz/privkey.pem;

    # SSL sozlamalari
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Fayl yuklash maksimal hajmi
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # /api → Backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # /uploads → Backend (rasmlar)
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Frontend (barcha qolgan so'rovlar)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
