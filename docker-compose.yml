services:

  # ================================
  # PostgreSQL
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: buildpos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256m
    networks:
      - internal                    # Faqat ichki network — tashqaridan kirish yo'q
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # Spring Boot Backend
  # ================================
  backend:
    build:
      context: .                    # ← repo ildizi (src/ va pom.xml shu yerda)
      dockerfile: Dockerfile        # ← repo ildizidagi Dockerfile
    container_name: buildpos-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_UPLOAD_DIR: /app/uploads
      JAVA_TOOL_OPTIONS: "-Xmx400m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    mem_limit: 512m
    volumes:
      - /opt/buildpos/uploads:/app/uploads   # Rasmlar — host da to'g'ridan saqlash
      - maven_cache:/root/.m2       # Maven dependency cache
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # React Frontend (Nginx)
  # ================================
  frontend:
    build:
      context: ./frontend           # ← frontend/ papkasi
      dockerfile: Dockerfile
    container_name: buildpos-frontend
    restart: unless-stopped
    volumes:
      - node_cache:/app/node_modules  # npm install cache (build tezlashtirish)
    networks:
      - proxy
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ================================
  # Nginx (SSL + Reverse Proxy)
  # ================================
  nginx:
    image: nginx:alpine
    container_name: buildpos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/buildpos.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # SSL sertifikat
      - /var/www/certbot:/var/www/certbot:ro    # Certbot tekshiruvi
    networks:
      - proxy
    depends_on:
      - frontend
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ================================
# Volumes
# ================================
volumes:
  postgres_data:                    # DB ma'lumotlari
  maven_cache:                      # Maven dependency cache (build tezlashtirish)
  node_cache:                       # npm node_modules cache (build tezlashtirish)

# ================================
# Networks
# ================================
networks:
  internal:                         # PostgreSQL + Backend (tashqaridan ko'rinmaydi)
  proxy:                            # Backend + Frontend + Nginx
